version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai-collab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aicollab
      POSTGRES_PASSWORD: aicollab123
      POSTGRES_DB: aicollab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicollab"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-collab-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-collab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-collab-network

  # Backend API Server (Development)
  api:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: ai-collab-api-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://aicollab:aicollab123@postgres:5432/aicollab?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - JWT_SECRET=dev-secret-key-change-in-production
      - API_KEY_SALT=dev-salt-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./apps/server/src:/app/src
      - ./apps/server/prisma:/app/prisma
    networks:
      - ai-collab-network
    command: sh -c "npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:
  redis_data:

networks:
  ai-collab-network:
    driver: bridge
