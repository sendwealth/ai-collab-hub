version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai-collab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aicollab}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-aicollab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aicollab}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-collab-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-collab-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-collab-network

  # Backend API Server
  api:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: ai-collab-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-aicollab}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-aicollab}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY_SALT=${API_KEY_SALT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - ai-collab-network
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend Web Application (Optional)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ai-collab-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:3000}
    ports:
      - "3001:3000"
    networks:
      - ai-collab-network
    profiles:
      - full

  # Prometheus Monitoring (Optional)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ai-collab-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ai-collab-network
    profiles:
      - monitoring

  # Grafana Dashboard (Optional)
  grafana:
    image: grafana/grafana:10.2.2
    container_name: ai-collab-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3002:3000"
    networks:
      - ai-collab-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ai-collab-network:
    driver: bridge
