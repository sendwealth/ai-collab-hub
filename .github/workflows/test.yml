name: Code Quality

on:
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run Prettier
        run: pnpm format:check

      - name: Run TypeScript
        run: pnpm type-check

      - name: Security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for TODOs
        run: |
          if grep -r "TODO\|FIXME\|XXX" apps/server/src --exclude-dir=node_modules; then
            echo "::warning::Found TODOs in code"
          fi
